<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUMIX PK - OTT Platform</title>
  <style>
    :root{
      --bg:#0A0A0C;
      --surface:#161418;
      --surface-2:#201C22;
      --text:#F2EFEA;
      --muted:#8B8790;
      --red:#C4211B;
      --red-bright:#E8433D;
      --blue:#3E8FE0;
      --blue-dim:#1E4A7A;
      --line: rgba(242,239,234,0.08);
    }
    *{box-sizing:border-box;}
    body{margin:0; background:var(--bg); color:var(--text); font-family:'Inter',system-ui,sans-serif;}
    
    .mq-root{
      min-height:100vh;
      overflow-x:hidden;
    }

    .mq-nav{
      position:sticky; top:0; z-index:40;
      display:flex; align-items:center; justify-content:space-between;
      padding:16px 32px;
      background:linear-gradient(180deg, rgba(10,10,12,0.95), rgba(10,10,12,0.7));
      backdrop-filter:blur(6px);
      border-bottom:1px solid var(--line);
    }
    .mq-logo{
      font-family:Arial, sans-serif; font-weight:800; font-size:20px; letter-spacing:0.5px;
      color:var(--text); display:flex; align-items:center; gap:10px; cursor:pointer; user-select:none;
    }
    .mq-logo-mark{ width:30px; height:30px; flex-shrink:0; }
    .mq-logo-pk{ color:var(--red-bright); }
    .mq-nav-links{ display:flex; gap:24px; align-items:center; }
    .mq-nav-link{
      color:var(--muted); font-size:14px; cursor:pointer; background:none; border:none;
      font-family:'Inter',sans-serif; padding:6px 2px; border-bottom:2px solid transparent;
    }
    .mq-nav-link.active{ color:var(--text); border-bottom-color:var(--red-bright); }
    .mq-nav-right{ display:flex; align-items:center; gap:14px; }
    .mq-search{
      background:var(--surface); border:1px solid var(--line); color:var(--text);
      padding:8px 12px; border-radius:6px; font-size:13px; width:180px; font-family:'Inter',sans-serif;
    }
    .mq-search:focus{ outline:2px solid var(--red-bright); outline-offset:1px; }

    .mq-hero{
      position:relative; margin:28px 32px 8px 32px; border-radius:14px; padding:3px;
      background:
        radial-gradient(circle, var(--red-bright) 2.4px, transparent 2.5px),
        radial-gradient(circle, var(--blue) 2.4px, transparent 2.5px);
      background-size: 22px 22px, 22px 22px;
      background-position: 0 0, 11px 11px;
      animation: mq-bulbs 2.6s steps(2) infinite;
    }
    @keyframes mq-bulbs{ 0%{ filter:brightness(1); } 50%{ filter:brightness(0.6); } 100%{ filter:brightness(1); } }
    .mq-hero-inner{
      position:relative; border-radius:11px; overflow:hidden; min-height:420px;
      background:linear-gradient(180deg, rgba(10,10,12,0.15) 0%, rgba(10,10,12,0.55) 55%, rgba(10,10,12,0.97) 100%), var(--surface);
      background-size:cover; background-position:center; display:flex; align-items:flex-end; padding:40px;
    }
    .mq-hero-content{ max-width:560px; }
    .mq-hero-eyebrow{
      color:var(--blue); font-size:12px; letter-spacing:2px; text-transform:uppercase;
      font-family:'JetBrains Mono', monospace; margin-bottom:10px; display:block;
    }
    .mq-hero-title{ font-size:44px; line-height:1.05; margin:0 0 14px 0; font-weight:600; }
    .mq-hero-desc{ color:var(--muted); font-size:15px; line-height:1.55; margin-bottom:18px; max-width:480px; }
    .mq-hero-actions{ display:flex; gap:12px; align-items:center; }

    .mq-tags{ display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
    .mq-tag{
      font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--text); background:var(--surface-2);
      padding:5px 12px; border:1px solid var(--line); border-radius:4px;
    }

    .mq-btn{
      background:var(--red-bright); color:#1A0705; border:none; padding:9px 16px;
      border-radius:6px; font-size:13px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif;
    }
    .mq-btn:hover{ background:#f0554e; }
    .mq-btn-ghost{
      background:transparent; border:1px solid var(--line); color:var(--text);
      padding:9px 16px; border-radius:6px; font-size:13px; cursor:pointer; font-family:'Inter',sans-serif;
    }
    .mq-btn-ghost:hover{ border-color:var(--blue); color:var(--blue); }

    .mq-section{ margin:36px 32px; }
    .mq-section-head{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:14px; }
    .mq-section-title{ font-size:20px; font-weight:600; margin:0; }
    .mq-section-count{ color:var(--muted); font-size:12px; font-family:'JetBrains Mono',monospace; }
    .mq-row{ display:flex; gap:14px; overflow-x:auto; padding-bottom:10px; }

    .mq-card{
      flex:0 0 220px; cursor:pointer; border-radius:8px; overflow:hidden; background:var(--surface);
      border:1px solid var(--line); transition:transform 0.15s ease, border-color 0.15s ease; position:relative;
    }
    .mq-card:hover{ transform:translateY(-4px); border-color:var(--blue-dim); }
    .mq-card-poster{ width:100%; height:124px; object-fit:cover; display:block; background:var(--surface-2); }
    .mq-card-body{ padding:10px 12px 12px 12px; }
    .mq-card-title{ font-size:14px; font-weight:600; margin:0 0 4px 0; }
    .mq-card-meta{ color:var(--muted); font-size:11px; font-family:'JetBrains Mono',monospace; }

    .mq-overlay{
      position:fixed; inset:0; background:rgba(4,4,5,0.88); z-index:100;
      display:flex; align-items:flex-start; justify-content:center; overflow-y:auto; padding:40px 16px;
    }
    .mq-modal{ background:var(--surface); border-radius:12px; max-width:720px; width:100%; overflow:hidden; border:1px solid var(--line); }
    .mq-modal-media{ width:100%; background:#000; aspect-ratio:16/9; display:block; }
    .mq-modal-media video, .mq-modal-media iframe{ width:100%; height:100%; display:block; border:none; }
    .mq-modal-body{ padding:28px; }
    .mq-modal-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:16px; }
    .mq-modal-title{ font-size:26px; margin:0 0 10px 0; }
    .mq-modal-meta{ color:var(--muted); font-size:12px; margin-bottom:14px; }
    .mq-modal-desc{ font-size:14px; line-height:1.6; color:var(--text); margin-bottom:18px; }

    .mq-toast{
      position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
      background:var(--surface-2); border:1px solid var(--blue); color:var(--text);
      padding:10px 18px; border-radius:6px; font-size:13px; z-index:200;
    }
    .mq-footer{ text-align:center; color:var(--muted); font-size:12px; padding:40px 20px 30px 20px; }

    .mq-intro{
      position:fixed; inset:0; z-index:500; background:#000;
      display:flex; align-items:center; justify-content:center;
      animation: mq-intro-out 0.6s ease-out 2.4s forwards;
    }
    .mq-intro-mark{ width:220px; max-width:60vw; opacity:0; transform:scale(0.82);
      animation: mq-intro-in 0.9s cubic-bezier(.2,.8,.2,1) 0.15s forwards; }
    @keyframes mq-intro-in{ 0%{ opacity:0; transform:scale(0.82); } 60%{ opacity:1; transform:scale(1.04); } 100%{ opacity:1; transform:scale(1); } }
    @keyframes mq-intro-out{ to{ opacity:0; visibility:hidden; pointer-events:none; } }

    @media (max-width:640px){
      .mq-nav{ padding:12px 16px; }
      .mq-nav-links{ display:none; }
      .mq-search{ width:110px; }
      .mq-hero{ margin:16px; }
      .mq-hero-inner{ min-height:320px; padding:22px; }
      .mq-hero-title{ font-size:30px; }
      .mq-section{ margin:26px 16px; }
      .mq-card{ flex:0 0 150px; }
      .mq-card-poster{ height:88px; }
    }
  </style>
</head>
<body>
